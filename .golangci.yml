version: "2"
linters:
  default: none
  enable:
    # --- correctness ---
    - errcheck
    - errorlint
    - govet
    - ineffassign
    - makezero
    - nilerr
    - nilnil
    - staticcheck
    - unused
    - durationcheck
    - asasalint
    - copyloopvar
    - reassign
    # --- complexity ---
    - gocyclo
    # --- style ---
    - dupl
    - goconst
    - gocritic
    - godot
    - misspell
    - nakedret
    - nolintlint
    - revive
    - unconvert
    - unparam
    - whitespace
    - dupword
    - recvcheck
    # --- security ---
    - gosec
    # --- performance ---
    - perfsprint
    - prealloc
    - mirror
    # --- best practices ---
    - gochecknoinits
    - testifylint
    - usestdlibvars
    - intrange
    - modernize
  settings:
    dupl:
      threshold: 200
    gocyclo:
      min-complexity: 15
    goconst:
      min-len: 3
      min-occurrences: 3
    gocritic:
      disabled-checks:
        - wrapperFunc
        - singleCaseSwitch
        - ifElseChain
      enabled-tags:
        - performance
        - style
    govet:
      enable:
        - shadow
    misspell:
      locale: US
  exclusions:
    generated: lax
    rules:
      # Package-level doc comments are not required on every file.
      - linters: [staticcheck]
        text: at least one file in a package should have a package comment
      - linters: [revive]
        text: should have a package comment
      # Test files get relaxed rules.
      - linters: [dupl, gosec, goconst]
        path: _test\.go
      - linters: [revive]
        path: _test\.go$
        text: unused-parameter
      - linters: [unparam, unused]
        path: _test\.go$
    paths:
      - vendor
      - third_party$
      - builtin$
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
