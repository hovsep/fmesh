name: Sync wiki

# docs/wiki/ is the source of truth; the GitHub wiki is a published mirror.
# Any change to docs/wiki/ that lands on main overwrites the wiki entirely.

on:
  push:
    branches: [main]
    paths:
      - "docs/wiki/**"
      - ".github/workflows/wiki.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    name: Push docs/wiki to the GitHub wiki
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Clone wiki
        run: git clone "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git" /tmp/wiki

      - name: Overwrite wiki content
        run: rsync -a --delete --exclude=.git docs/wiki/ /tmp/wiki/

      - name: Commit and push
        working-directory: /tmp/wiki
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Wiki already up to date"
            exit 0
          fi
          git commit -m "Sync wiki from ${{ github.sha }}"
          git push
