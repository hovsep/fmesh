name: Benchmarks

# Reports performance deltas (PR head vs. base branch) as a sticky PR comment.
# Advisory only: this workflow never fails the check — GitHub-hosted runners are
# noisy shared VMs, so benchmark numbers are guidance, not a merge gate.
# See .agent/docs/benchmarking.md for how to read the output.

on:
  pull_request

permissions:
  contents: read
  pull-requests: write

# Cancel superseded runs when the PR is updated (e.g. force-push).
concurrency:
  group: bench-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  benchmark:
    name: Compare benchmarks (benchstat)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # need base + head commits to benchmark both

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: "1.26"

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      # -count=8 lets benchstat estimate variance and mark insignificant deltas as "~".
      - name: Benchmark base branch
        continue-on-error: true
        run: |
          git checkout --quiet ${{ github.event.pull_request.base.sha }}
          go test -run='^$' -bench=. -benchmem -count=8 ./... | tee base.txt

      - name: Benchmark PR head
        continue-on-error: true
        run: |
          git checkout --quiet ${{ github.event.pull_request.head.sha }}
          go test -run='^$' -bench=. -benchmem -count=8 ./... | tee pr.txt

      - name: Compare with benchstat
        continue-on-error: true
        run: benchstat base.txt pr.txt | tee bench.txt

      # Upsert a single sticky comment (identified by the marker): a short
      # summary of statistically significant deltas up top, the full benchstat
      # table collapsed below. Dependency-free: gh CLI ships on the runner.
      - name: Post results as sticky PR comment
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          MARKER='<!-- fmesh-benchstat -->'

          # Rows benchstat marks statistically significant (no "~"). Columns are
          # separated by 2+ spaces; the metric name carries over from the section header.
          awk '
            index($0, "vs base") { split($0, h, "│"); metric = h[2]; gsub(/ /, "", metric); next }
            /\(p=/ && !/~/ {
              split($0, col, /  +/)
              split(col[4], d, " ")
              printf "| `%s` | %s | %s | %s | %s |\n", col[1], metric, col[2], col[3], d[1]
            }
          ' bench.txt > significant.md

          regressions=$(grep -c '| +' significant.md) || true
          improvements=$(grep -c '| -' significant.md) || true

          {
            echo "$MARKER"
            echo '## Benchmark report (advisory)'
            echo
            if ! [ -s bench.txt ]; then
              echo '⚠️ benchstat produced no output — see the workflow logs.'
            elif ! [ -s significant.md ]; then
              echo '**No statistically significant performance changes** (PR head vs. base branch).'
            else
              echo "**Statistically significant changes: ${regressions} regression(s), ${improvements} improvement(s)** (PR head vs. base branch)."
              echo
              echo '| Benchmark | Metric | Base | PR | Δ |'
              echo '|---|---|---|---|---|'
              cat significant.md
              echo
              echo 'Higher is worse on every metric. `allocs/op` is the most reliable signal on shared CI runners; treat `sec/op` as guidance.'
            fi
            echo
            echo '<details>'
            echo '<summary>Full benchstat table</summary>'
            echo
            echo '```'
            cat bench.txt
            echo '```'
            echo
            echo '</details>'
          } > comment.md

          existing=$(gh pr view "$PR_NUMBER" --json comments \
            --jq '.comments[] | select(.body | contains("'"$MARKER"'")) | .url' | tail -n1)
          if [ -n "$existing" ]; then
            gh pr comment "$PR_NUMBER" --edit-last --body-file comment.md
          else
            gh pr comment "$PR_NUMBER" --body-file comment.md
          fi
